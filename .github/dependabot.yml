version: 2
updates:
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: monthly
    groups:
      all:
        patterns: [ "*" ]
    cooldown:
      default-days: 3

  - package-ecosystem: npm
    directory: /dashboard
    schedule:
      interval: monthly
    groups:
      all:
        patterns: [ "*" ]
    cooldown:
      default-days: 3

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    groups:
      all:
        patterns: [ "*" ]
    cooldown:
      default-days: 3

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: monthly
    groups:
      all:
        patterns: [ "*" ]
    cooldown:
      default-days: 3
