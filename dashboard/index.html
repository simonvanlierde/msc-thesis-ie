<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Stamp the theme before first paint, or a saved override flashes the other theme.
         Key and fallback must match src/lib/useTheme.ts. -->
    <script>"use strict";
      try {
        const saved = localStorage.getItem("cooling-dashboard.theme");
        const dark =
          saved === "dark" ||
          (saved !== "light" && matchMedia("(prefers-color-scheme: dark)").matches);
        document.documentElement.dataset.theme = dark ? "dark" : "light";
      } catch {
        document.documentElement.dataset.theme = "light";
      }
    </script>

    <title>Cooling for Comfort, Warming the World — The Hague</title>
    <meta
      name="description"
      content="Interactive dashboard of building cooling demand, its electricity use and its life-cycle climate impact in The Hague — MSc Industrial Ecology thesis."
    />

    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#f9f9f7" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0d0d0d" media="(prefers-color-scheme: dark)" />

    <!-- Both faces are used above the fold (wordmark, headline, body), so both preload. -->
    <link
      rel="preload"
      href="/fonts/public-sans-latin-wght-normal.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/fonts/newsreader-latin-wght-normal.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link rel="preconnect" href="https://basemaps.cartocdn.com" crossorigin />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Cooling for Comfort, Warming the World — The Hague" />
    <meta
      property="og:description"
      content="Offices fill 13% of the floor area but drive 65% of The Hague's cooling-related greenhouse-gas emissions."
    />
    <meta property="og:image" content="/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="A year of cooling demand in The Hague, drawn as a grid of months by hours."
    />
    <meta name="twitter:card" content="summary_large_image" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
