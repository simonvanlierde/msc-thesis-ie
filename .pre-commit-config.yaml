# Mirrors the CI checks in .github/workflows/ci.yml.
# Install once with: uv run pre-commit install
repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix
        language: system
        types_or: [python, pyi, jupyter]
        require_serial: true

      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types_or: [python, pyi, jupyter]
        require_serial: true

      # Informational, like the type-check job in CI: the scientific code annotates with
      # `np.array` in many places, which ty flags. Reported, never blocking.
      - id: ty
        name: ty check (informational)
        entry: bash -c 'uv run ty check || true'
        language: system
        types: [python]
        pass_filenames: false
        verbose: true

      - id: pytest
        name: pytest
        entry: uv run pytest
        language: system
        types: [python]
        pass_filenames: false
